spring:
  application:
    name: crypto-signals

server:
  port: ${PORT:8080}

# MEXC API Configuration (public endpoints - no auth required)
mexc:
  base-url: https://api.mexc.com
  timeout: 10000

# OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# Logging
logging:
  level:
    com.christianjaena.crypto_signals: DEBUG
    org.springframework.web.client: DEBUG
